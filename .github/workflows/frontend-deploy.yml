name: Deploy Buenaventura Reporta

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Build del frontend
        env:
          CI: false
          GENERATE_SOURCEMAP: false
        run: npm run build

      - name: Limpiar carpeta del servidor
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            find /var/www/ds1/buenaventura-reporta -mindepth 1 ! -name '.htaccess' -exec rm -rf {} +

      - name: Subir frontend al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "build/*"
          target: "/var/www/ds1/buenaventura-reporta"
          strip_components: 1
          rm: false
